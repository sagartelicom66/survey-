<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin – Survey</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    body { background: #f4f4f5; }

    /* Login */
    .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(145deg, var(--green) 0%, var(--green-light) 100%); padding: 24px; }
    .login-card { background: #fff; border-radius: 24px; padding: 40px 32px; width: 100%; max-width: 380px; box-shadow: var(--shadow-lg); display: flex; flex-direction: column; gap: 14px; }
    .login-logo { font-size: 2.5rem; text-align: center; }
    .login-card h2 { color: var(--green-mid); text-align: center; font-size: 1.4rem; font-weight: 800; margin-top: -4px; }
    .login-card .muted { text-align: center; margin-top: -6px; }

    /* Admin shell */
    #admin-app { display: none; }
    .admin-header {
      background: linear-gradient(90deg, var(--green) 0%, var(--green-mid) 100%);
      color: #fff;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
      box-shadow: 0 2px 12px rgba(0,0,0,.15);
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .admin-header h1 { font-size: 1.15rem; font-weight: 700; letter-spacing: -.2px; }
    .admin-wrap { max-width: 960px; margin: 0 auto; padding: 28px 20px 72px; }

    /* Stats */
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 14px; margin-bottom: 28px; }
    .stat-card {
      background: #fff;
      border-radius: 18px;
      padding: 20px 18px;
      text-align: center;
      box-shadow: var(--shadow-sm);
      border: 1.5px solid var(--gray-border);
      transition: box-shadow .2s;
    }
    .stat-card:hover { box-shadow: var(--shadow); }
    .stat-num { font-size: 2.2rem; font-weight: 800; color: var(--green-mid); line-height: 1; }
    .stat-label { font-size: .8rem; color: var(--muted); margin-top: 6px; font-weight: 500; text-transform: uppercase; letter-spacing: .5px; }

    /* Tabs */
    .tab-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 20px; background: #fff; padding: 6px; border-radius: 14px; box-shadow: var(--shadow-sm); border: 1.5px solid var(--gray-border); width: fit-content; }
    .tab-btn { padding: 9px 20px; border-radius: 10px; border: none; background: transparent; color: var(--text-2); font-weight: 600; cursor: pointer; font-size: .92rem; transition: background .15s, color .15s; }
    .tab-btn.active { background: var(--green-mid); color: #fff; box-shadow: 0 2px 8px rgba(46,125,50,.3); }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* Card */
    .card { background: #fff; border-radius: 18px; padding: 22px 20px; box-shadow: var(--shadow-sm); margin-bottom: 16px; border: 1.5px solid var(--gray-border); }
    .card-title { font-size: 1rem; font-weight: 700; color: var(--green-mid); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }

    /* Search */
    .search-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
    .search-row input, .search-row select { flex: 1; min-width: 140px; }

    /* Table */
    .table-wrap { overflow-x: auto; border-radius: 12px; border: 1.5px solid var(--gray-border); }
    table { width: 100%; border-collapse: collapse; font-size: .88rem; }
    thead { position: sticky; top: 0; }
    th { background: var(--green-bg); color: var(--green-mid); padding: 11px 14px; text-align: left; font-weight: 700; font-size: .8rem; text-transform: uppercase; letter-spacing: .5px; white-space: nowrap; }
    td { padding: 11px 14px; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafafa; }
    .response-detail { font-size: .82rem; color: var(--muted); }

    /* Control buttons */
    .ctrl-btns { display: flex; gap: 12px; flex-wrap: wrap; }
    .ctrl-btns .btn { flex: none; padding: 13px 24px; font-size: .95rem; }
    .btn-danger { background: linear-gradient(135deg, #dc2626, #ef4444); color: #fff; box-shadow: 0 4px 14px rgba(220,38,38,.3); }
    .btn-warn { background: linear-gradient(135deg, #d97706, #f59e0b); color: #fff; box-shadow: 0 4px 14px rgba(217,119,6,.3); }

    /* Spin */
    .spin-area { text-align: center; padding: 28px 0 20px; }
    .spin-name { font-size: 2.2rem; font-weight: 800; color: var(--green-mid); min-height: 64px; transition: all .08s; line-height: 1.2; }
    .spin-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .spin-actions .btn { flex: none; padding: 13px 32px; }

    /* Winner badge */
    .winner-badge { background: var(--gold-light); border: 2px solid var(--gold-border); border-radius: var(--radius); padding: 16px 18px; }
    .winners-list { display: flex; flex-direction: column; gap: 10px; margin-top: 4px; }
    .winner-item { background: var(--gold-light); border: 2px solid var(--gold-border); border-radius: 12px; padding: 14px 18px; font-weight: 600; }

    /* Delay */
    .delay-opts { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
    .delay-opts .btn { flex: none; padding: 10px 18px; font-size: .9rem; }

    /* Status badge */
    .status-badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px; border-radius: 99px; font-size: .8rem; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; }
    .status-active { background: #dcfce7; color: #16a34a; }
    .status-paused { background: #fef9c3; color: #ca8a04; }
    .status-stopped { background: #fee2e2; color: #dc2626; }

    /* Modal */
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:100; align-items:center; justify-content:center; backdrop-filter:blur(2px); }
    .modal-overlay.open { display:flex; }
    .modal-box { background:#fff; border-radius:20px; padding:28px; max-width:580px; width:92%; max-height:82vh; overflow-y:auto; box-shadow:var(--shadow-lg); }
    .modal-box h3 { color:var(--green-mid); margin-bottom:14px; font-size:1.1rem; }
    .answer-row { margin-bottom:10px; font-size:.9rem; padding: 10px 14px; background: var(--gray); border-radius: 8px; }
    .answer-row strong { color:var(--green-mid); display:block; font-size:.78rem; text-transform:uppercase; letter-spacing:.5px; margin-bottom:2px; }

    /* View btn */
    .btn-view { padding: 6px 14px; font-size: .8rem; border-radius: 8px; flex: none; background: var(--green-bg); color: var(--green-mid); border: 1.5px solid #a5d6a7; font-weight: 600; cursor: pointer; transition: background .15s; }
    .btn-view:hover { background: #c8e6c9; }
  </style>
</head>
<body>

<!-- Login -->
<div id="login-wrap" class="login-wrap">
  <div class="login-card">
    <div class="login-logo">📋</div>
    <h2>Admin Login</h2>
    <p class="muted">Survey Management Panel</p>
    <input type="email" id="admin-email" placeholder="Email address" />
    <input type="password" id="admin-password" placeholder="Password" />
    <div class="error-msg" id="login-error"></div>
    <button class="btn btn-primary btn-full" id="btn-login">Sign In</button>
  </div>
</div>

<!-- Admin App -->
<div id="admin-app">
  <div class="admin-header">
    <h1>📋 Survey Admin</h1>
    <button class="btn btn-secondary" id="btn-logout" style="flex:none;padding:8px 18px;font-size:.88rem">Sign Out</button>
  </div>
  <div class="admin-wrap">

    <!-- Stats -->
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-num" id="stat-total">–</div><div class="stat-label">Responses</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-status">–</div><div class="stat-label">Status</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-last">–</div><div class="stat-label">Last Response</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-unique">–</div><div class="stat-label">Unique</div></div>
    </div>

    <!-- Tabs -->
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="responses">📊 Responses</button>
      <button class="tab-btn" data-tab="control">⚙️ Control</button>
      <button class="tab-btn" data-tab="luckydraw">🎰 Lucky Draw</button>
    </div>

    <!-- Responses Tab -->
    <div class="tab-panel active" id="tab-responses">
      <div class="card">
        <div class="search-row">
          <input type="text" id="search-input" placeholder="🔍 Search name, mobile, area…" />
          <select id="filter-age">
            <option value="">All Ages</option>
            <option>Under 18</option><option>18–25</option><option>26–35</option>
            <option>36–45</option><option>46–60</option><option>60+</option>
          </select>
          <button class="btn btn-primary" id="btn-export" style="flex:none;padding:11px 20px;font-size:.9rem">⬇ Export CSV</button>
        </div>
        <div class="table-wrap">
          <table id="responses-table">
            <thead><tr>
              <th>ID</th><th>Name</th><th>Mobile</th><th>Area</th><th>Age</th><th>Lang</th><th>Time</th><th></th>
            </tr></thead>
            <tbody id="responses-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Control Tab -->
    <div class="tab-panel" id="tab-control">
      <div class="card">
        <div class="card-title">⚙️ Survey Control</div>
        <div class="ctrl-btns">
          <button class="btn btn-primary" id="btn-start-survey">▶ Start</button>
          <button class="btn btn-warn" id="btn-pause-survey">⏸ Pause</button>
          <button class="btn btn-danger" id="btn-stop-survey">⏹ Stop</button>
        </div>
        <div id="current-status" class="mt-16"></div>
      </div>
    </div>

    <!-- Lucky Draw Tab -->
    <div class="tab-panel" id="tab-luckydraw">
      <div class="card">
        <div class="card-title">⏱ Winner Announcement Delay</div>
        <p class="muted">Set delay after survey close before announcing winners:</p>
        <div class="delay-opts">
          <button class="btn btn-secondary delay-set" data-min="10">10 min</button>
          <button class="btn btn-secondary delay-set" data-min="30">30 min</button>
          <button class="btn btn-secondary delay-set" data-min="60">1 hour</button>
          <button class="btn btn-secondary" id="btn-custom-delay">Custom…</button>
        </div>
        <div id="custom-delay-wrap" style="display:none;margin-top:14px;display:none">
          <input type="number" id="custom-delay-input" placeholder="Minutes" style="max-width:160px" />
          <button class="btn btn-primary" id="btn-set-custom" style="margin-top:10px;padding:12px 22px">Set Delay</button>
        </div>
      </div>
      <div class="card">
        <div class="card-title">🎰 Spin the Wheel</div>
        <div class="spin-area">
          <div class="spin-name" id="spin-name">–</div>
          <div class="muted mt-8" id="spin-id"></div>
        </div>
        <div class="spin-actions">
          <button class="btn btn-gold" id="btn-spin">🎰 Start Spin</button>
          <button class="btn btn-primary" id="btn-pick-winner" disabled>✅ Select Winner</button>
        </div>
        <div class="mt-16">
          <div class="card-title" style="margin-bottom:10px">🏆 Winners</div>
          <div class="winners-list" id="winners-list"></div>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- Response Detail Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal-box">
    <h3>📋 Response Detail</h3>
    <div id="modal-content"></div>
    <button class="btn btn-secondary btn-full mt-16" id="modal-close">Close</button>
  </div>
</div>

<script type="module" src="admin.js"></script>
</body>
</html>
